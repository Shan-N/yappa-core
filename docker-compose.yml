version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./webui/dist:/var/www/html:ro
    depends_on:
      auth:
        condition: service_healthy
      realtime:
        condition: service_healthy
    restart: unless-stopped

  realtime:
    build: ./realtime-ws
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-yappa-rt}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-realtime}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-realtime}:${POSTGRES_PASSWORD:-realtime}@postgres:5432/${POSTGRES_DB:-realtime}
      KAFKA_BROKERS: kafka:9092
      PERSISTENCE_MODE: ${PERSISTENCE_MODE:-direct}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MAX_USERS_PER_TENANT: ${MAX_USERS_PER_TENANT:-10}
      PORT: "8080"
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth:
    build: ./yappa-auth
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-yappa-rt}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-realtime}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-5m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      DATABASE_URL: postgres://${POSTGRES_USER:-realtime}:${POSTGRES_PASSWORD:-realtime}@postgres:5432/${POSTGRES_DB:-realtime}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realtime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realtime}
      POSTGRES_DB: ${POSTGRES_DB:-realtime}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./realtime-ws/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realtime}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
